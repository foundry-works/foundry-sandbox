# Tinyproxy configuration for gateway egress proxy
# Rejects IP literal requests, forces DNS resolution

Port 8888
Listen 0.0.0.0
MaxClients 50

# Timeouts (seconds) - 120s for long git operations
Timeout 120
ConnectPort 443
ConnectPort 80

# Logging to stderr for container environments
LogLevel Warning
Syslog Off

# URL filtering - deny by default, allow only domain-name URLs
Filter "/etc/tinyproxy/filter"
FilterURLs On
FilterDefaultDeny Yes
FilterCaseSensitive Off

# Allowed methods
DisableViaHeader Yes

# Upstream: forward allowed traffic to gateway
# (configured at runtime by build-config.sh)
