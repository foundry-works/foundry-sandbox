name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# Pytest isolation note: the root package and foundry-git-safety each have a
# top-level `tests/` directory.  Running them in one pytest invocation causes
# import collisions.  Each test job installs and runs from its own working
# directory to avoid this.

jobs:
  # -- Root package --
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: >
          pytest tests/unit/ -v --tb=short
          --cov=foundry_sandbox --cov-report=term-missing --cov-fail-under=60
          --junitxml=junit-unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-results-py${{ matrix.python-version }}
          path: junit-unit.xml

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy --strict foundry_sandbox/

      - name: Run ruff
        run: ruff check .

      - name: Run shellcheck
        run: |
          sudo apt-get install -y -qq shellcheck 2>/dev/null
          # SC2329: cleanup invoked via trap; SC2259: pipe + heredoc for HMAC body
          shellcheck -e SC2329,SC2259 foundry_sandbox/assets/git-wrapper.sh
          # SC2163: export -f for functions, not patterns (false positive)
          shellcheck -e SC2163 tests/run.sh
          # SC2317: trap cleanup removal pattern; SC2155: local+assign for readability
          # SC2034: vars used in piped subshells; SC1091: sourced file unavailable in curl-pipe install
          # SC2162: read -p without -r (cosmetic); SC2064: intentional early expansion in trap
          # SC2129: multiple echos to file (readability over efficiency)
          shellcheck -e SC2317,SC2155,SC2034,SC1091,SC2162,SC2064,SC2129 install.sh
          # SC2034: color variables used in echo -e (false positive)
          shellcheck -e SC2034 uninstall.sh

  # -- foundry-git-safety standalone package --
  git-safety-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: foundry-git-safety
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: foundry-git-safety/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  git-safety-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: foundry-git-safety
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: foundry-git-safety/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run security tests
        run: pytest tests/security/ -v --tb=short

  git-safety-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: foundry-git-safety
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: foundry-git-safety/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  # -- Smoke gate (installed-wheel verification) --
  smoke-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build tools
        run: pip install build pytest

      - name: Build wheels
        run: |
          python -m build --outdir /tmp/wheels .
          python -m build --outdir /tmp/wheels foundry-git-safety/

      - name: Install into clean venv
        run: |
          python -m venv /tmp/smoke-venv
          source /tmp/smoke-venv/bin/activate
          pip install /tmp/wheels/foundry_git_safety-*.whl
          pip install /tmp/wheels/foundry_sandbox-*.whl

      - name: Run root packaging assertions
        run: |
          source /tmp/smoke-venv/bin/activate
          pytest tests/unit/test_packaging.py -v --tb=short

      - name: Run git-safety packaging assertions
        run: |
          source /tmp/smoke-venv/bin/activate
          cd foundry-git-safety
          pytest tests/unit/test_packaging.py -v --tb=short

      - name: Run cast diagnose
        run: |
          source /tmp/smoke-venv/bin/activate
          OUTPUT=$(cast diagnose --json)
          echo "$OUTPUT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'versions' in d; assert 'sbx_diagnose' in d"

      - name: Run migration smoke test
        run: |
          source /tmp/smoke-venv/bin/activate
          pip install -q -e ".[dev]"
          pytest tests/smoke/test_migration_smoke.py -v --tb=short

  # -- Gate --
  all-pass:
    runs-on: ubuntu-latest
    needs: [unit, lint, git-safety-unit, git-safety-security, git-safety-integration, smoke-gate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.unit.result }}" != "success" ] ||
             [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.git-safety-unit.result }}" != "success" ] ||
             [ "${{ needs.git-safety-security.result }}" != "success" ] ||
             [ "${{ needs.git-safety-integration.result }}" != "success" ] ||
             [ "${{ needs.smoke-gate.result }}" != "success" ]; then
            echo "One or more required jobs failed:"
            echo "  unit: ${{ needs.unit.result }}"
            echo "  lint: ${{ needs.lint.result }}"
            echo "  git-safety-unit: ${{ needs.git-safety-unit.result }}"
            echo "  git-safety-security: ${{ needs.git-safety-security.result }}"
            echo "  git-safety-integration: ${{ needs.git-safety-integration.result }}"
            echo "  smoke-gate: ${{ needs.smoke-gate.result }}"
            exit 1
          fi
          echo "All required jobs passed."
